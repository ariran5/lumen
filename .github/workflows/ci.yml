name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & test on iOS Simulator
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick a simulator
        id: simulator
        run: |
          # Pick the first available iPhone simulator (any recent model).
          DEST=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
              dev=next((x for r in d.values() for x in r if x['name'].startswith('iPhone') and x['isAvailable']), None); \
              print(dev['name'])")
          echo "name=$DEST" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $DEST"

      - name: Build
        run: |
          xcodebuild build \
            -scheme Lumen \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          xcodebuild test \
            -scheme Lumen \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit ${PIPESTATUS[0]}
