name: Lumen

# DEVELOPMENT_TEAM is intentionally empty — simulator builds need no team.
# For device builds: open Xcode, select the Lumen target → Signing &
# Capabilities → pick your team from the dropdown. The generated *.xcodeproj
# is gitignored, so this stays local.

options:
  bundleIdPrefix: com.lumen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Lumen:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Sources
        optional: true
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: "0.0.1"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSFaceIDUsageDescription: "Lumen использует Face ID для авторизации в фастаппах."
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: com.lumen.browser
            CFBundleURLSchemes:
              - lumen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumen.browser
        PRODUCT_NAME: Lumen
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

  LumenTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        optional: true
    dependencies:
      - target: Lumen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumen.browser.tests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
